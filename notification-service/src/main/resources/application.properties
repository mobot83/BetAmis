quarkus.http.port=8084

# ── JWT (SmallRye) ────────────────────────────────────────────────────────────
%dev.mp.jwt.verify.publickey.location=http://localhost:8180/realms/betamis/protocol/openid-connect/certs
%dev.mp.jwt.verify.issuer=http://localhost:8180/realms/betamis
%prod.mp.jwt.verify.publickey.location=${JWT_PUBLIC_KEY_LOCATION}
%prod.mp.jwt.verify.issuer=${JWT_ISSUER}
mp.jwt.verify.publickey.location=META-INF/resources/publicKey.pem
mp.jwt.verify.issuer=https://betamis.com
quarkus.smallrye-jwt.enabled=true

# ── DataSource (PostgreSQL) ───────────────────────────────────────────────────
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:betamis}
quarkus.datasource.password=${DB_PASSWORD:betamis_secret}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/notification_db

# ── Hibernate ORM ─────────────────────────────────────────────────────────────
quarkus.hibernate-orm.database.generation=none

# ── Flyway ────────────────────────────────────────────────────────────────────
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration

# ── Kafka ─────────────────────────────────────────────────────────────────────
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
kafka.schema.registry.url=${KAFKA_SCHEMA_REGISTRY_URL:http://localhost:8081}

mp.messaging.incoming.match-scheduled.connector=smallrye-kafka
mp.messaging.incoming.match-scheduled.topic=match.scheduled
mp.messaging.incoming.match-scheduled.value.deserializer=io.confluent.kafka.serializers.KafkaAvroDeserializer
mp.messaging.incoming.match-scheduled.group.id=notification-service
mp.messaging.incoming.match-scheduled.failure-strategy=dead-letter-queue
mp.messaging.incoming.match-scheduled.dead-letter-queue.topic=match.scheduled.dlq

# ── Mailer ────────────────────────────────────────────────────────────────────
%dev.quarkus.mailer.host=localhost
%dev.quarkus.mailer.port=1025
%dev.quarkus.mailer.mock=false
%prod.quarkus.mailer.host=${SMTP_HOST}
%prod.quarkus.mailer.port=${SMTP_PORT:587}
%prod.quarkus.mailer.username=${SMTP_USERNAME}
%prod.quarkus.mailer.password=${SMTP_PASSWORD}
%prod.quarkus.mailer.start-tls=REQUIRED
notification.mail.from=noreply@betamis.com
notification.base-url=https://betamis.com

# ── Web Push (VAPID) ──────────────────────────────────────────────────────────
notification.vapid.public-key=${VAPID_PUBLIC_KEY}
# notification.vapid.private-key and notification.vapid.subject will be needed once VAPID is implemented

# ── Metrics (Prometheus) ──────────────────────────────────────────────────────
quarkus.micrometer.export.prometheus.enabled=true

# ── OpenTelemetry ─────────────────────────────────────────────────────────────
quarkus.application.name=notification-service
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
%dev.quarkus.otel.sdk.disabled=true
%test.quarkus.otel.sdk.disabled=true

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Match Reminder — BetAmis</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
    .container { max-width: 560px; margin: 32px auto; background: #fff; border-radius: 8px; overflow: hidden; }
    .header { background: #1a73e8; color: #fff; padding: 24px 32px; }
    .header h1 { margin: 0; font-size: 22px; }
    .body { padding: 24px 32px; }
    .match { font-size: 20px; font-weight: bold; text-align: center; padding: 16px 0; }
    .kickoff { text-align: center; color: #666; font-size: 14px; margin-bottom: 16px; }
    .cta { text-align: center; margin: 24px 0; }
    .cta a { background: #1a73e8; color: #fff; padding: 12px 24px; border-radius: 4px; text-decoration: none; font-weight: bold; }
    .footer { padding: 16px 32px; font-size: 12px; color: #999; text-align: center; border-top: 1px solid #eee; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>⚽ Match Reminder</h1>
  </div>
  <div class="body">
    <p>The match starts in <strong>{timeLabel}</strong>. Don't forget to place your prediction!</p>
    <div class="match">{homeTeamId} vs {awayTeamId}</div>
    <div class="kickoff">Kickoff: {kickoffAt} UTC</div>
    <div class="cta">
      <a href="https://betamis.com">Place your prediction</a>
    </div>
  </div>
  <div class="footer">
    <p>You're receiving this because you have match reminders enabled on BetAmis.</p>
    <p>Don't want these emails? <a href="{unsubscribeUrl}">Unsubscribe in one click</a>.</p>
  </div>
</div>
</body>
</html>

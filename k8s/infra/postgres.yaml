apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: betamis-infra
type: Opaque
stringData:
  POSTGRES_USER: betamis
  POSTGRES_PASSWORD: betamis_secret
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: betamis-infra
data:
  init-databases.sql: |
    CREATE DATABASE match_db WITH OWNER = betamis;
    CREATE DATABASE prediction_db WITH OWNER = betamis;
    CREATE DATABASE scoring_db WITH OWNER = betamis;
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: betamis-infra
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: league_db
          volumeMounts:
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "betamis", "-d", "league_db"]
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: init-sql
          configMap:
            name: postgres-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: betamis-infra
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP

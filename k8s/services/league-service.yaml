apiVersion: v1
kind: ConfigMap
metadata:
  name: league-service-config
  namespace: betamis-dev
data:
  DB_HOST: postgres.betamis-infra.svc.cluster.local
  DB_PORT: "5432"
  KAFKA_BOOTSTRAP_SERVERS: kafka.betamis-infra.svc.cluster.local:9092
  KAFKA_SCHEMA_REGISTRY_URL: http://schema-registry.betamis-infra.svc.cluster.local:8081
  JWT_PUBLIC_KEY_LOCATION: http://keycloak.betamis-infra.svc.cluster.local:8080/realms/betamis/protocol/openid-connect/certs
  JWT_ISSUER: http://keycloak.betamis-infra.svc.cluster.local:8080/realms/betamis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: league-service
  namespace: betamis-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: league-service
  template:
    metadata:
      labels:
        app: league-service
    spec:
      containers:
        - name: league-service
          image: betamis/league-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: league-service-config
            - secretRef:
                name: betamis-secrets
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: league-service
  namespace: betamis-dev
spec:
  selector:
    app: league-service
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP

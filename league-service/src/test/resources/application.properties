# ── DataSource — Quarkus DevServices lance PostgreSQL via Testcontainers ───────
# Pas d'URL JDBC → DevServices démarre automatiquement un conteneur PG
quarkus.datasource.db-kind=postgresql
quarkus.datasource.devservices.enabled=true
quarkus.flyway.migrate-at-start=true

# ── Hibernate ORM ─────────────────────────────────────────────────────────────
quarkus.hibernate-orm.database.generation=none

# ── JWT (test) ────────────────────────────────────────────────────────────────
# @TestSecurity is used in tests — no JWT key required
mp.jwt.verify.issuer=https://betamis.com

# ── Kafka — in-memory connectors ──────────────────────────────────────────────
mp.messaging.outgoing.league-created.connector=smallrye-in-memory
mp.messaging.outgoing.league-member-joined.connector=smallrye-in-memory



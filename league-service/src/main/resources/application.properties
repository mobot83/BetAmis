# ── DataSource (PostgreSQL) ───────────────────────────────────────────────────
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:betamis}
quarkus.datasource.password=${DB_PASSWORD:betamis_secret}
# URL explicite uniquement pour dev et prod ; le profil test utilise DevServices (Testcontainers)
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/league_db
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/league_db

# ── Hibernate ORM ─────────────────────────────────────────────────────────────
quarkus.hibernate-orm.database.generation=none

# ── Flyway ────────────────────────────────────────────────────────────────────
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration

# ── JWT (SmallRye) ────────────────────────────────────────────────────────────
# Public key must be supplied via JWT_PUBLIC_KEY_LOCATION env var (no bundled key)
mp.jwt.verify.publickey.location=${JWT_PUBLIC_KEY_LOCATION}
mp.jwt.verify.issuer=${JWT_ISSUER:https://betamis.com}
quarkus.smallrye-jwt.enabled=true

# ── Kafka ─────────────────────────────────────────────────────────────────────
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
kafka.schema.registry.url=${KAFKA_SCHEMA_REGISTRY_URL:http://localhost:8081}

mp.messaging.outgoing.league-created.connector=smallrye-kafka
mp.messaging.outgoing.league-created.topic=league.created
mp.messaging.outgoing.league-created.value.serializer=io.confluent.kafka.serializers.KafkaAvroSerializer

mp.messaging.outgoing.league-member-joined.connector=smallrye-kafka
mp.messaging.outgoing.league-member-joined.topic=league.member-joined
mp.messaging.outgoing.league-member-joined.value.serializer=io.confluent.kafka.serializers.KafkaAvroSerializer


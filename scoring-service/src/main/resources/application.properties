# Application
quarkus.application.name=scoring-service

# Database
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:betamis}
quarkus.datasource.password=${DB_PASSWORD:betamis}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:scoring}

# Flyway
quarkus.flyway.migrate-at-start=true

# Hibernate
quarkus.hibernate-orm.database.generation=validate

# Redis — explicit host only in prod; DevServices handles dev and test automatically
%prod.quarkus.redis.hosts=redis://${REDIS_HOST}:${REDIS_PORT:6379}

# Kafka
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
kafka.schema.registry.url=${KAFKA_SCHEMA_REGISTRY_URL:http://localhost:8081}

# Consumers
mp.messaging.incoming.prediction-submitted.connector=smallrye-kafka
mp.messaging.incoming.prediction-submitted.topic=prediction.submitted
mp.messaging.incoming.prediction-submitted.value.deserializer=io.confluent.kafka.serializers.KafkaAvroDeserializer
mp.messaging.incoming.prediction-submitted.specific.avro.reader=true
mp.messaging.incoming.prediction-submitted.schema.registry.url=${KAFKA_SCHEMA_REGISTRY_URL:http://localhost:8081}
mp.messaging.incoming.prediction-submitted.auto.offset.reset=earliest
mp.messaging.incoming.prediction-submitted.group.id=scoring-service

mp.messaging.incoming.match-finished.connector=smallrye-kafka
mp.messaging.incoming.match-finished.topic=match.finished
mp.messaging.incoming.match-finished.value.deserializer=io.confluent.kafka.serializers.KafkaAvroDeserializer
mp.messaging.incoming.match-finished.specific.avro.reader=true
mp.messaging.incoming.match-finished.schema.registry.url=${KAFKA_SCHEMA_REGISTRY_URL:http://localhost:8081}
mp.messaging.incoming.match-finished.auto.offset.reset=earliest
mp.messaging.incoming.match-finished.group.id=scoring-service

mp.messaging.incoming.league-member-joined.connector=smallrye-kafka
mp.messaging.incoming.league-member-joined.topic=league.member-joined
mp.messaging.incoming.league-member-joined.value.deserializer=io.confluent.kafka.serializers.KafkaAvroDeserializer
mp.messaging.incoming.league-member-joined.specific.avro.reader=true
mp.messaging.incoming.league-member-joined.schema.registry.url=${KAFKA_SCHEMA_REGISTRY_URL:http://localhost:8081}
mp.messaging.incoming.league-member-joined.auto.offset.reset=earliest
mp.messaging.incoming.league-member-joined.group.id=scoring-service

# Producers
mp.messaging.outgoing.points-calculated.connector=smallrye-kafka
mp.messaging.outgoing.points-calculated.topic=points.calculated
mp.messaging.outgoing.points-calculated.value.serializer=io.confluent.kafka.serializers.KafkaAvroSerializer
mp.messaging.outgoing.points-calculated.schema.registry.url=${KAFKA_SCHEMA_REGISTRY_URL:http://localhost:8081}

mp.messaging.outgoing.ranking-updated.connector=smallrye-kafka
mp.messaging.outgoing.ranking-updated.topic=ranking.updated
mp.messaging.outgoing.ranking-updated.value.serializer=io.confluent.kafka.serializers.KafkaAvroSerializer
mp.messaging.outgoing.ranking-updated.schema.registry.url=${KAFKA_SCHEMA_REGISTRY_URL:http://localhost:8081}

# OpenTelemetry
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
%dev.quarkus.otel.sdk.disabled=true
%test.quarkus.otel.sdk.disabled=true

# Metrics
quarkus.micrometer.export.prometheus.enabled=true

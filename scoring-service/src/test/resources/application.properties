quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
quarkus.flyway.enabled=false
quarkus.hibernate-orm.database.generation=drop-and-create

# Use in-memory channels so tests don't need a real Kafka / Schema Registry
mp.messaging.outgoing.points-calculated.connector=smallrye-in-memory
mp.messaging.outgoing.ranking-updated.connector=smallrye-in-memory
mp.messaging.incoming.prediction-submitted.connector=smallrye-in-memory
mp.messaging.incoming.match-finished.connector=smallrye-in-memory

# Redis DevServices enabled via %test.quarkus.redis.devservices.enabled in application.properties
quarkus.redis.health.enabled=false

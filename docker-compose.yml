version: '3.9'

services:

  # ──────────────────────────────────────────
  # Zookeeper
  # ──────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: betamis-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - betamis-net
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────
  # Kafka
  # ──────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: betamis-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"       # accès depuis l'hôte
      - "29092:29092"     # accès inter-conteneurs
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - betamis-net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ──────────────────────────────────────────
  # Schema Registry (Confluent)
  # ──────────────────────────────────────────
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    container_name: betamis-schema-registry
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    networks:
      - betamis-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ──────────────────────────────────────────
  # PostgreSQL — instance unique, 4 bases
  # ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: betamis-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: betamis
      POSTGRES_PASSWORD: betamis_secret
      POSTGRES_DB: league_db   # base par défaut
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    networks:
      - betamis-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U betamis -d league_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────
  # Redis
  # ──────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: betamis-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass betamis_redis_secret
    volumes:
      - redis-data:/data
    networks:
      - betamis-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "betamis_redis_secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────
  # Mailhog — serveur SMTP de développement
  # ──────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: betamis-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # UI Web
    networks:
      - betamis-net

# ──────────────────────────────────────────
# Volumes
# ──────────────────────────────────────────
volumes:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:
  postgres-data:
  redis-data:

# ──────────────────────────────────────────
# Réseau
# ──────────────────────────────────────────
networks:
  betamis-net:
    driver: bridge


# ── HTTP ──────────────────────────────────────────────────────────────────────
quarkus.http.port=8080

# ── DataSource (PostgreSQL) ───────────────────────────────────────────────────
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=betamis
quarkus.datasource.password=betamis_secret
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/prediction_db

# ── Hibernate ORM ─────────────────────────────────────────────────────────────
quarkus.hibernate-orm.database.generation=none

# ── Flyway ────────────────────────────────────────────────────────────────────
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration

# ── Kafka ─────────────────────────────────────────────────────────────────────
kafka.bootstrap.servers=localhost:9092

mp.messaging.outgoing.prediction-submitted.connector=smallrye-kafka
mp.messaging.outgoing.prediction-submitted.topic=prediction.submitted

mp.messaging.outgoing.prediction-closed.connector=smallrye-kafka
mp.messaging.outgoing.prediction-closed.topic=prediction.closed

mp.messaging.incoming.match-started.connector=smallrye-kafka
mp.messaging.incoming.match-started.topic=match.started

# ── OpenTelemetry ─────────────────────────────────────────────────────────────
quarkus.otel.exporter.otlp.endpoint=http://localhost:4317

# ── Dev mode overrides ────────────────────────────────────────────────────────
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/prediction_db
%dev.quarkus.otel.sdk.disabled=true

# ── Test overrides ────────────────────────────────────────────────────────────
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:prediction_test;DB_CLOSE_DELAY=-1
%test.quarkus.flyway.locations=db/migration,db/testdata
%test.quarkus.otel.sdk.disabled=true

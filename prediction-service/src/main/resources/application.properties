# ── Application ───────────────────────────────────────────────────────────────
quarkus.application.name=prediction-service

# ── HTTP ──────────────────────────────────────────────────────────────────────
quarkus.http.port=8082

# ── DataSource (PostgreSQL) ───────────────────────────────────────────────────
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:betamis}
quarkus.datasource.password=${DB_PASSWORD:betamis_secret}
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/prediction_db
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/prediction_db

# ── Hibernate ORM ─────────────────────────────────────────────────────────────
quarkus.hibernate-orm.database.generation=none

# ── Flyway ────────────────────────────────────────────────────────────────────
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration

# ── JWT (SmallRye) ────────────────────────────────────────────────────────────
%dev.mp.jwt.verify.publickey.location=http://localhost:8180/realms/betamis/protocol/openid-connect/certs
%dev.mp.jwt.verify.issuer=http://localhost:8180/realms/betamis
%prod.mp.jwt.verify.publickey.location=${JWT_PUBLIC_KEY_LOCATION}
%prod.mp.jwt.verify.issuer=${JWT_ISSUER}
mp.jwt.verify.publickey.location=META-INF/resources/publicKey.pem
mp.jwt.verify.issuer=https://betamis.com
quarkus.smallrye-jwt.enabled=true

# ── Kafka ─────────────────────────────────────────────────────────────────────
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
kafka.schema.registry.url=${KAFKA_SCHEMA_REGISTRY_URL:http://localhost:8081}

# Schema Registry
mp.messaging.connector.smallrye-kafka.schema.registry.url=${KAFKA_SCHEMA_REGISTRY_URL:http://localhost:8081}

# Outgoing — prediction.submitted
mp.messaging.outgoing.prediction-submitted.connector=smallrye-kafka
mp.messaging.outgoing.prediction-submitted.topic=prediction.submitted
mp.messaging.outgoing.prediction-submitted.value.serializer=io.confluent.kafka.serializers.KafkaAvroSerializer
mp.messaging.outgoing.prediction-submitted.schema.registry.url=${KAFKA_SCHEMA_REGISTRY_URL:http://localhost:8081}

# Outgoing — prediction.closed
mp.messaging.outgoing.prediction-closed.connector=smallrye-kafka
mp.messaging.outgoing.prediction-closed.topic=prediction.closed
mp.messaging.outgoing.prediction-closed.value.serializer=io.confluent.kafka.serializers.KafkaAvroSerializer
mp.messaging.outgoing.prediction-closed.schema.registry.url=${KAFKA_SCHEMA_REGISTRY_URL:http://localhost:8081}

# Incoming — match.finished
mp.messaging.incoming.match-started.connector=smallrye-kafka
mp.messaging.incoming.match-started.topic=match.started
mp.messaging.incoming.match-started.value.deserializer=io.confluent.kafka.serializers.KafkaAvroDeserializer
mp.messaging.incoming.match-started.specific.avro.reader=true
mp.messaging.incoming.match-started.schema.registry.url=${KAFKA_SCHEMA_REGISTRY_URL:http://localhost:8081}

# ── Metrics (Prometheus) ──────────────────────────────────────────────────────
quarkus.micrometer.export.prometheus.enabled=true

# ── OpenTelemetry ─────────────────────────────────────────────────────────────
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}

# ── Dev mode overrides ────────────────────────────────────────────────────────
%dev.quarkus.otel.sdk.disabled=true

# ── Test overrides ────────────────────────────────────────────────────────────
%test.quarkus.otel.sdk.disabled=true
%test.mp.messaging.outgoing.prediction-submitted.connector=smallrye-in-memory
%test.mp.messaging.outgoing.prediction-closed.connector=smallrye-in-memory
%test.mp.messaging.incoming.match-started.connector=smallrye-in-memory

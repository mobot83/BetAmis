quarkus.rest-client.football-data.url=https://api.football-data.org

# ── JWT (SmallRye) ────────────────────────────────────────────────────────────
%dev.mp.jwt.verify.publickey.location=http://localhost:8180/realms/betamis/protocol/openid-connect/certs
%dev.mp.jwt.verify.issuer=http://localhost:8180/realms/betamis
%prod.mp.jwt.verify.publickey.location=${JWT_PUBLIC_KEY_LOCATION}
%prod.mp.jwt.verify.issuer=${JWT_ISSUER}
mp.jwt.verify.publickey.location=META-INF/resources/publicKey.pem
mp.jwt.verify.issuer=https://betamis.com
quarkus.smallrye-jwt.enabled=true
football-data.api-token=${FOOTBALL_DATA_API_TOKEN}

# ── DataSource (PostgreSQL) ───────────────────────────────────────────────────
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:betamis}
quarkus.datasource.password=${DB_PASSWORD:betamis_secret}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/match_db

# ── Hibernate ORM ─────────────────────────────────────────────────────────────
quarkus.hibernate-orm.database.generation=none

# ── Flyway ────────────────────────────────────────────────────────────────────
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration

# Comma-separated list of competition IDs to sync (e.g. PL = Premier League, FL1 = Ligue 1)
match.sync.competition-ids=PL, WC
# Cron expression for match sync (default: every 5 minutes)
match.sync.cron=0 */5 * * * ?

# ── Kafka ─────────────────────────────────────────────────────────────────────
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
kafka.schema.registry.url=${KAFKA_SCHEMA_REGISTRY_URL:http://localhost:8081}

mp.messaging.outgoing.match-started.connector=smallrye-kafka
mp.messaging.outgoing.match-started.topic=match.started
mp.messaging.outgoing.match-started.value.serializer=io.confluent.kafka.serializers.KafkaAvroSerializer

mp.messaging.outgoing.match-finished.connector=smallrye-kafka
mp.messaging.outgoing.match-finished.topic=match.finished
mp.messaging.outgoing.match-finished.value.serializer=io.confluent.kafka.serializers.KafkaAvroSerializer

quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
quarkus.flyway.enabled=false
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.scheduler.enabled=false
football-data.api-token=test-token
match.sync.competition-ids=PL,WC
match.sync.cron=0 */5 * * * ?

mp.messaging.outgoing.match-scheduled.connector=smallrye-in-memory
mp.messaging.outgoing.match-started.connector=smallrye-in-memory
mp.messaging.outgoing.match-finished.connector=smallrye-in-memory

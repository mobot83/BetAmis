# kind-specific staging overrides — mirrors dev: single controller on the
# control-plane node with hostPort so traffic on 80/443 reaches the pod.
controller:
  replicaCount: 1
  hostPort:
    enabled: true
  nodeSelector:
    ingress-ready: "true"
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
  service:
    type: NodePort
  admissionWebhooks:
    enabled: false

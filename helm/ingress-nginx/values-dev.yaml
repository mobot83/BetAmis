# kind-specific: run on the control-plane node via hostPort so that traffic
# reaching host ports 80/443 (via extraPortMappings) hits the controller.
controller:
  replicaCount: 1
  hostPort:
    enabled: true
  nodeSelector:
    ingress-ready: "true"
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
  service:
    type: NodePort
  # Admission webhooks require the controller to be running before any Ingress
  # resource can be created. In kind the webhook server is often not ready in
  # time, causing helm to fail. Disable it for local dev — prod keeps it on.
  admissionWebhooks:
    enabled: false

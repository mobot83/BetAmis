image:
  repository: betamis/prediction-service
  tag: dev
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  port: 8082

healthPath: /q/health/ready
livenessPath: /q/health/live

ingress:
  enabled: false
  host: ""
  paths:
    - "/api/predictions(/|$)(.*)"
  rewriteTarget: "/$2"
  tls: false
  tlsSecretName: ""
  issuer: betamis-selfsigned
  annotations: {}

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  scaleDownStabilizationSeconds: 60

resources:
  requests:
    memory: "384Mi"
    cpu: "250m"
  limits:
    memory: "768Mi"
    cpu: "1000m"

config:
  DB_HOST: ""
  DB_PORT: "5432"
  KAFKA_BOOTSTRAP_SERVERS: ""
  KAFKA_SCHEMA_REGISTRY_URL: ""
  JWT_PUBLIC_KEY_LOCATION: ""
  JWT_ISSUER: ""
  SMALLRYE_JWT_PATH_GROUPS: "realm_access/roles"
  OTEL_EXPORTER_OTLP_ENDPOINT: ""

secret:
  create: true
  existingSecret: ""
  data:
    DB_USERNAME: betamis
    DB_PASSWORD: ""

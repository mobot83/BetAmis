image:
  repository: betamis/match-service
  tag: dev
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  port: 8080

healthPath: /q/health/ready
livenessPath: /q/health/live

hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  scaleDownStabilizationSeconds: 60

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

config:
  DB_HOST: ""
  DB_PORT: "5432"
  KAFKA_BOOTSTRAP_SERVERS: ""
  KAFKA_SCHEMA_REGISTRY_URL: ""
  JWT_PUBLIC_KEY_LOCATION: ""
  JWT_ISSUER: ""

secret:
  create: true
  existingSecret: ""
  data:
    DB_USERNAME: betamis
    DB_PASSWORD: ""
    FOOTBALL_DATA_API_TOKEN: ""

apiVersion: apps/v1
kind: Deployment
metadata:
  name: schema-registry
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "betamis-infra.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: schema-registry
  template:
    metadata:
      labels:
        app: schema-registry
    spec:
      enableServiceLinks: false
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ .Values.kafka.advertisedHost }} 9092; do echo "waiting for kafka"; sleep 2; done']
      containers:
        - name: schema-registry
          image: {{ .Values.schemaRegistry.image }}
          ports:
            - containerPort: 8081
          env:
            - name: SCHEMA_REGISTRY_HOST_NAME
              value: schema-registry
            - name: SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS
              value: {{ include "betamis-infra.kafkaBootstrap" . | quote }}
            - name: SCHEMA_REGISTRY_LISTENERS
              value: http://0.0.0.0:8081
          readinessProbe:
            httpGet:
              path: /subjects
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            {{- toYaml .Values.schemaRegistry.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: schema-registry
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: schema-registry
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP

postgres:
  image: postgres:16-alpine
  auth:
    username: betamis
    password: ""
    database: league_db
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

zookeeper:
  image: confluentinc/cp-zookeeper:7.6.1
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

kafka:
  image: confluentinc/cp-kafka:7.6.1
  # Must match the Kubernetes Service DNS: kafka.<namespace>.svc.cluster.local
  advertisedHost: ""
  resources:
    requests:
      memory: "512Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

schemaRegistry:
  image: confluentinc/cp-schema-registry:7.6.1
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

redis:
  image: redis:7.2-alpine
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "200m"

keycloak:
  image: quay.io/keycloak/keycloak:24.0
  admin:
    username: admin
    password: admin
  resources:
    requests:
      memory: "512Mi"
      cpu: "200m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

otelCollector:
  image: otel/opentelemetry-collector-contrib:0.117.0
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "200m"

tempo:
  image: grafana/tempo:2.7.2
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "512Mi"
      cpu: "500m"

grafana:
  image: grafana/grafana:11.4.0
  admin:
    user: admin
    # Must be overridden in values-prod.yaml (e.g. via external-secrets or sealed-secrets)
    password: ""
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "500m"

# =============================================================================
# BetAmis — App of Apps root application
#
# Apply once to bootstrap ArgoCD:
#   kubectl apply -f argocd/root-app.yaml
#
# ArgoCD then manages every Application in argocd/apps/ automatically.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: betamis
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/mobot83/BetAmis
    targetRevision: HEAD
    path: argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

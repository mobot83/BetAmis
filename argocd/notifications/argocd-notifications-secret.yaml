# =============================================================================
# ArgoCD Notifications — credential template
#
# DO NOT commit real credentials. Populate values before applying:
#
#   kubectl create secret generic argocd-notifications-secret \
#     --namespace argocd \
#     --from-literal=slack-token='xoxb-...' \
#     --from-literal=email-smtp-host='smtp.gmail.com' \
#     --from-literal=email-from='betamis-ci@example.com' \
#     --from-literal=email-username='betamis-ci@example.com' \
#     --from-literal=email-password='...' \
#     --save-config --dry-run=client -o yaml | kubectl apply -f -
#
# Or use External Secrets / Sealed Secrets to manage this secret in GitOps style.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: argocd-notifications-secret
  namespace: argocd
type: Opaque
stringData:
  slack-token: ""          # Slack bot token  (xoxb-...)
  email-smtp-host: ""      # SMTP host         (smtp.gmail.com)
  email-from: ""           # Sender address
  email-username: ""       # SMTP username
  email-password: ""       # SMTP password / app-password

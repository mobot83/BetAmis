apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
data:
  # ── Notification services ───────────────────────────────────────────────────
  service.slack: |
    token: $slack-token

  service.email: |
    host: $email-smtp-host
    port: 587
    from: $email-from
    username: $email-username
    password: $email-password

  # ── Recipient groups ────────────────────────────────────────────────────────
  # Maps the logical name used in Application annotations to actual addresses.
  subscriptions: |
    - recipients:
        - email:betamis-team
      selector: ""

  # ── Templates ───────────────────────────────────────────────────────────────
  template.app-deployed: |
    email:
      subject: "[BetAmis] {{.app.metadata.name}} deployed ({{.app.status.sync.revision | truncate 8 \"\"}})"
    message: |
      *{{.app.metadata.name}}* deployed successfully.
      • Revision: `{{.app.status.sync.revision | truncate 8 ""}}`
      • Namespace: `{{.app.spec.destination.namespace}}`
    slack:
      attachments: |
        [{
          "color": "good",
          "title": "✅ {{.app.metadata.name}} deployed",
          "title_link": "{{.context.argocdUrl}}/applications/{{.app.metadata.name}}",
          "fields": [
            {"title": "Revision", "value": "{{.app.status.sync.revision | truncate 8 \"\"}}", "short": true},
            {"title": "Namespace", "value": "{{.app.spec.destination.namespace}}", "short": true}
          ]
        }]

  template.app-sync-failed: |
    email:
      subject: "[BetAmis] {{.app.metadata.name}} sync FAILED"
    message: |
      *{{.app.metadata.name}}* sync failed.
      • Phase: `{{.app.status.operationState.phase}}`
      • Error: {{.app.status.operationState.message}}
    slack:
      attachments: |
        [{
          "color": "danger",
          "title": "❌ {{.app.metadata.name}} sync failed",
          "title_link": "{{.context.argocdUrl}}/applications/{{.app.metadata.name}}",
          "fields": [
            {"title": "Phase", "value": "{{.app.status.operationState.phase}}", "short": true},
            {"title": "Error", "value": "{{.app.status.operationState.message}}", "short": false}
          ]
        }]

  # ── Triggers ─────────────────────────────────────────────────────────────────
  trigger.on-deployed: |
    - description: Notify when app syncs successfully and becomes healthy
      when: app.status.operationState.phase in ['Succeeded'] and app.status.health.status == 'Healthy'
      send: [app-deployed]

  trigger.on-sync-failed: |
    - description: Notify when app sync ends in error or failure
      when: app.status.operationState.phase in ['Error', 'Failed']
      send: [app-sync-failed]

  # ── Default subscriptions ────────────────────────────────────────────────────
  # Applied to every Application unless overridden by per-app annotations.
  defaultTriggers: |
    - on-deployed
    - on-sync-failed

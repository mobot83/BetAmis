name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Detect which services have changed ────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            league-service:
              - 'league-service/**'
              - 'schemas/**'
            match-service:
              - 'match-service/**'
              - 'schemas/**'
            prediction-service:
              - 'prediction-service/**'
              - 'schemas/**'
            scoring-service:
              - 'scoring-service/**'
              - 'schemas/**'

  # ── Build + unit tests + integration tests ────────────────────────────────────
  test:
    needs: changes
    if: needs.changes.outputs.services != '[]' && needs.changes.outputs.services != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.changes.outputs.services) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ matrix.service }}-${{ hashFiles(format('{0}/pom.xml', matrix.service)) }}
          restore-keys: |
            ${{ runner.os }}-maven-${{ matrix.service }}-
            ${{ runner.os }}-maven-

      - name: Test
        working-directory: ${{ matrix.service }}
        run: mvn verify -Dschema.registry.skip=true

  # ── Build image → push GHCR → update Helm values (main only) ─────────────────
  publish:
    needs: [changes, test]
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.changes.outputs.services != '[]' &&
      needs.changes.outputs.services != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.changes.outputs.services) }}
    permissions:
      contents: write
      packages: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA
        id: sha
        run: echo "short=${GITHUB_SHA:0:8}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/betamis/${{ matrix.service }}:${{ steps.sha.outputs.short }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/betamis/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Update Helm image tag
        env:
          IMAGE_REPO: ${{ env.REGISTRY }}/${{ github.repository_owner }}/betamis/${{ matrix.service }}
          IMAGE_TAG: ${{ steps.sha.outputs.short }}
          SERVICE: ${{ matrix.service }}
        run: |
          yq e ".image.repository = \"${IMAGE_REPO}\"" -i helm/${SERVICE}/values-prod.yaml
          yq e ".image.tag = \"${IMAGE_TAG}\"" -i helm/${SERVICE}/values-prod.yaml

      - name: Open Helm update PR
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "ci(${{ matrix.service }}): bump image tag to ${{ steps.sha.outputs.short }}"
          branch: ci/helm-update-${{ matrix.service }}-${{ steps.sha.outputs.short }}
          delete-branch: true
          title: "ci(${{ matrix.service }}): bump image tag to ${{ steps.sha.outputs.short }}"
          body: |
            Automated Helm values update triggered by push to `main`.

            | Field   | Value |
            |---------|-------|
            | Service | `${{ matrix.service }}` |
            | Image   | `${{ env.REGISTRY }}/${{ github.repository_owner }}/betamis/${{ matrix.service }}` |
            | Tag     | `${{ steps.sha.outputs.short }}` |
            | Commit  | ${{ github.sha }} |
          labels: ci,helm-update
